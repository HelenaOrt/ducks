<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enhorabuena, Flor</title>
    <meta name="description" content="Recompensa por encontrar los 100 patos" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%8C%B8%3C/text%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="duckCursor" class="duck-cursor" aria-hidden="true">
      <img src="assets/icons/pato.png" alt="" />
    </div>
    <div id="duckBurstLayer" class="duck-burst-layer" aria-hidden="true"></div>

    <main>
      <section id="screen1" class="screen active">
        <div class="container-xl py-5">
          <div class="hero-card mx-auto text-center">
            <p class="hero-kicker">Aventura superada</p>
            <h1>Enhorabuena, Flor <span class="flower">🌸</span></h1>
            <p class="hero-lead">Has encontrado los 100 patos.</p>
            <p class="hero-copy">
              Como lo prometido es deuda...<br />aqui tienes tu regalo.
            </p>

            <button id="openGiftBtn" class="btn btn-main">Abrir regalo</button>
          </div>
        </div>
      </section>

      <section id="screen2" class="screen">
        <div class="container-xl py-5">
          <div class="choice-card mx-auto text-center">
            <h1>Elige tu regalo</h1>
            <p class="subtitle">
              Solo puedes elegir una...<br />
            </p>

            <div id="choiceGrid" class="choice-grid"></div>
            <div id="choiceMessage" class="choice-message" aria-live="polite"></div>
          </div>
        </div>
      </section>

      <section id="screen3" class="screen">
        <div class="container-xxl py-4 py-md-5">
          <div class="calendly-card mx-auto">
            <h2 class="text-center">Reservar dia</h2>
            <div class="selected-choice-panel">
              <label for="selectedChoiceField" class="selected-choice-label">Recompensa elegida</label>
              <input id="selectedChoiceField" class="selected-choice-input" type="text" readonly value="" />
            </div>
            <div class="calendly-wrapper">
              <iframe
                id="calendlyFrame"
                title="Calendly"
                src=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
              ></iframe>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
